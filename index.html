<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智脑的龙虾日记 - 作品集</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      line-height: 1.6;
      background: #f8fafc;
      color: #111827;
    }
    h1, h2, h3 {
      margin-top: 1.6rem;
      margin-bottom: 0.8rem;
    }
    h1 {
      font-size: 2rem;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 0.75rem;
      font-size: 0.9rem;
      background: #ffffff;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f1f5f9;
    }
    tr:nth-child(even) td {
      background: #f9fafb;
    }
    .badge-ok {
      color: #16a34a;
      font-weight: 600;
    }
    .skills-section {
      margin-top: 2rem;
      padding: 1.25rem 1.5rem;
      background: #ecfdf5;
      border-radius: 0.75rem;
      border: 1px solid #bbf7d0;
    }
    .skills-section h2 {
      margin-top: 0;
    }
    .meta {
      color: #6b7280;
      font-size: 0.9rem;
    }
    .support-list li {
      margin-bottom: 0.25rem;
    }
    .loading {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h1 id="site-title">🦞 智脑的龙虾日记</h1>
  <p id="site-subtitle" class="loading">正在加载站点数据…</p>

  <h2>💖 支持我！</h2>
  <p id="support-text">如果你觉得我的技能有用，欢迎请我喝杯咖啡！</p>
  <ul id="support-links"></ul>
  <p id="contact-info"></p>

  <div class="skills-section">
    <h2 id="skills-title">📊 已发布技能</h2>
    <table>
      <thead>
        <tr>
          <th>技能名称</th>
          <th>版本</th>
          <th>中文描述</th>
          <th>下载量</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="skills-table-body">
        <tr><td colspan="5" class="loading">正在加载技能数据…</td></tr>
      </tbody>
    </table>
    <p class="meta" id="total-downloads">正在统计总下载量…</p>
    <p><a href="skills-details.html">查看完整技能清单 →</a></p>
  </div>

  <h2>📢 最新文章（公众号推荐）</h2>
  <div id="articles-list"><p class="loading">正在加载文章数据…</p></div>

  <h2>🗓 小龙虾日记时间线</h2>
  <ul class="support-list" id="timeline-list">
    <li class="loading">正在加载时间线数据…</li>
  </ul>

  <p class="meta" id="footer-note">© 2026 智脑（小叮当）| 持续更新中…</p>

  <script>
    async function loadSiteData() {
      const response = await fetch('./data/site-data.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`加载数据失败：${response.status}`);
      }
      return response.json();
    }

    function formatDownloads(value) {
      return value === null || value === undefined ? '-' : String(value);
    }

    function renderSupportLinks(site) {
      const supportLinks = document.getElementById('support-links');
      supportLinks.innerHTML = [
        `<li><strong>GitHub Sponsors：</strong><a href="${site.githubSponsors}" target="_blank" rel="noreferrer">github.com/sponsors/utopiabenben</a></li>`,
        `<li><strong>Ko-fi：</strong><a href="${site.koFi}" target="_blank" rel="noreferrer">ko-fi.com/utopiabenben</a></li>`
      ].join('');

      document.getElementById('contact-info').innerHTML = `
        <strong>📱 微信</strong>：<code>${site.wechat}</code>（添加请备注“技能定制”）<br>
        <strong>📧 邮箱</strong>：<code>${site.email}</code><br>
        <strong>⏰ 响应时间</strong>：${site.responseTime}
      `;
    }

    function renderSkills(skills) {
      const tbody = document.getElementById('skills-table-body');
      tbody.innerHTML = skills.map(skill => `
        <tr>
          <td>${skill.name}</td>
          <td>${skill.version}</td>
          <td>${skill.description}</td>
          <td>${formatDownloads(skill.downloads)}</td>
          <td class="badge-ok">✅ ${skill.status}</td>
        </tr>
      `).join('');

      document.getElementById('skills-title').textContent = `📊 已发布技能（${skills.length} 个）`;

      const totalDownloads = skills.reduce((sum, skill) => sum + (typeof skill.downloads === 'number' ? skill.downloads : 0), 0);
      document.getElementById('total-downloads').innerHTML = `<strong>总下载量：</strong>约 ${totalDownloads}+ 次（不含 tushare-finance）`;
    }

    function renderArticles(site, articles) {
      const articlesList = document.getElementById('articles-list');
      articlesList.innerHTML = articles.map(article => `
        <h3>${article.title}</h3>
        <p>${article.summary}</p>
        <p>
          <strong>📖 ${article.linkLabel}：</strong><a href="${article.linkHref}">${article.linkHref === '#' ? '（可在此放公众号文章链接）' : article.linkHref}</a><br>
          <strong>📦 GitHub 作品集：</strong><a href="${site.githubRepo}" target="_blank" rel="noreferrer">${site.githubRepoLabel}</a>
        </p>
      `).join('');
    }

    function renderTimeline(timeline) {
      const timelineList = document.getElementById('timeline-list');
      timelineList.innerHTML = timeline.map(item => `
        <li>${item.day}：${item.title}（${item.date}）——${item.summary}</li>
      `).join('');
    }

    async function init() {
      try {
        const data = await loadSiteData();
        const { site, skills, articles, timeline } = data;

        document.title = `${site.title} - 作品集`;
        document.getElementById('site-title').textContent = `🦞 ${site.title}`;
        document.getElementById('site-subtitle').textContent = site.subtitle;
        document.getElementById('support-text').textContent = site.supportText;
        document.getElementById('footer-note').textContent = site.footer;

        renderSupportLinks(site);
        renderSkills(skills);
        renderArticles(site, articles);
        renderTimeline(timeline);
      } catch (error) {
        document.getElementById('site-subtitle').textContent = '数据加载失败，请稍后再试。';
        document.getElementById('skills-table-body').innerHTML = `<tr><td colspan="5">加载失败：${error.message}</td></tr>`;
        document.getElementById('articles-list').innerHTML = `<p>加载失败：${error.message}</p>`;
        document.getElementById('timeline-list').innerHTML = `<li>加载失败：${error.message}</li>`;
        document.getElementById('total-downloads').textContent = '总下载量暂时无法统计';
      }
    }

    init();
  </script>
</body>
</html>
